name: paperwise
description: AI-powered paper reading assistant powered by MinerU and DeepSeek.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  dio: any
  file_picker: any
  path_provider: any
  shared_preferences: any
  archive: any
  flutter_markdown: any
  flutter_math_fork: any
  window_manager: any
  tray_manager: any
  logging: any
  uuid: any
  synchronized: any
  syncfusion_flutter_pdf: any
  ffi: any
  connectivity_plus: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: any

flutter:
  uses-material-design: true
  assets:
    - resources/
