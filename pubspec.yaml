name: paperwise
description: AI-powered paper reading assistant powered by MinerU and DeepSeek.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  dio: ^5.8.0+1
  dio_smart_retry: ^7.0.1
  file_picker: ^8.1.7+1
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.4
  archive: ^4.0.6
  flutter_markdown: ^0.7.7+2
  flutter_math_fork: ^0.7.3
  window_manager: ^0.4.3
  tray_manager: ^0.3.0
  url_launcher: ^6.3.1
  connectivity_plus: ^6.1.4
  flutter_riverpod: ^2.6.1
  freezed_annotation: ^3.0.0
  logging: ^1.3.0
  uuid: ^4.5.1
  intl: ^0.20.2
  share_plus: ^10.1.4
  json_annotation: ^4.9.0
  synchronized: ^3.3.0+3
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.0.4
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - resources/
