name: Build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [analyze, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ALICE-PaperPal-${{ github.ref_name }}
          path: build/windows/x64/runner/Release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/paperpal.exe
          body: |
            Download ALICE PaperPal ${{ github.ref_name }}

            AI-powered paper reading assistant with personality.

            ### Requirements
            - Windows 10/11
            - DeepSeek API Key (get at https://platform.deepseek.com)

            ### Features
            - AI soul system: 4 preset roles + custom creation
            - Conversation memory: remembers past discussions
            - Auto-translate: non-Chinese papers auto-translated
            - Stream Q&A: real-time token-by-token responses
            - PDF search, upload, URL import, file association
            - Multi-paper comparison, notes, export

            ### Changelog
            See CHANGELOG.md for details.
