name: Build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

  deploy-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [analyze, test]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - run: flutter build windows --release

      - name: Package ZIP (portable)
        shell: pwsh
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ALICE-PaperPal-${{ github.ref_name }}.zip

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --confirm --force

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows\installer.iss /DMyAppVersion=${{ github.ref_name }}

      - name: Create Release and upload Windows assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release create $tag --title $tag `
            --notes "Download ALICE PaperPal $tag

          **Windows:** Setup.exe + ZIP 便携版
          **Android:** APK (separate job)

          AI-powered paper reading assistant with personality." `
            build/windows/x64/runner/Release/ALICE-PaperPal-*.zip `
            build/installer/ALICE-PaperPal-*-Setup.exe

  deploy-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [analyze, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - run: flutter build apk --release

      - name: Upload APK to Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload ${{ github.ref_name }} build/app/outputs/flutter-apk/app-release.apk --clobber

      - name: Update Release body
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit ${{ github.ref_name }} --notes "Download ALICE PaperPal ${{ github.ref_name }}

          **Windows:**
          - \`ALICE-PaperPal-${{ github.ref_name }}-Setup.exe\` — 安装包
          - \`ALICE-PaperPal-${{ github.ref_name }}.zip\` — 便携版

          **Android:**
          - \`app-release.apk\` — Android APK

          AI-powered paper reading assistant with personality.

          ### Requirements
          - Windows 10/11
          - Android 7.0+ (API 24+)
          - DeepSeek API Key (get at https://platform.deepseek.com)

          ### Features
          - AI soul system: 4 preset roles + custom creation
          - Conversation memory: remembers past discussions
          - Auto-translate: non-Chinese papers auto-translated
          - Stream Q&A: real-time token-by-token responses
          - PDF search, upload, URL import, file association
          - Multi-paper comparison, notes, export
          - Alice in Wonderland themed UI (v0.2.0+)
          - Android mobile support (v0.3.0+)"
