name: Build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze --no-fatal-warnings --no-fatal-infos

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [analyze, test]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - name: Get version
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v', ''
          echo "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - run: flutter build windows --release

      - name: Package ZIP (portable)
        shell: pwsh
        run: |
          cd build/windows/x64/runner/Release
          Compress-Archive -Path * -DestinationPath ALICE-PaperPal-${{ github.ref_name }}.zip

      - name: Install Inno Setup
        run: choco install innosetup --no-progress --confirm

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          & "C:\Program Files (x86)\Inno Setup 6\iscc.exe" windows\installer.iss /DMyAppVersion=$ver

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ALICE-PaperPal-Windows-${{ github.ref_name }}
          path: |
            build/windows/x64/runner/Release/ALICE-PaperPal-*.zip
            build/installer/ALICE-PaperPal-*-Setup.exe

  build-android:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [analyze, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ALICE-PaperPal-APK-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: ALICE-PaperPal-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ALICE-PaperPal-*.zip
            ALICE-PaperPal-*-Setup.exe
            app-release.apk
          body: |
            Download ALICE PaperPal ${{ github.ref_name }}

            **Windows:**
            - `ALICE-PaperPal-*-Setup.exe` — 安装包（推荐）
            - `ALICE-PaperPal-*.zip` — 便携版（解压即用）

            **Android:**
            - `app-release.apk` — Android APK

            AI-powered paper reading assistant with personality.

            ### Requirements
            - Windows 10/11
            - Android 7.0+ (API 24+)
            - DeepSeek API Key (get at https://platform.deepseek.com)

            ### Features
            - AI soul system: 4 preset roles + custom creation
            - Conversation memory: remembers past discussions
            - Auto-translate: non-Chinese papers auto-translated
            - Stream Q&A: real-time token-by-token responses
            - PDF search, upload, URL import, file association
            - Multi-paper comparison, notes, export
            - Alice in Wonderland themed UI (v0.2.0+)
            - Android mobile support (v0.3.0+)
