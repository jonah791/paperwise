name: Build
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter test

  build:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [analyze, test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: PaperWise-${{ github.ref_name }}
          path: build/windows/x64/runner/Release/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/windows/x64/runner/Release/paperwise.exe
          body: |
            Download PaperWise ${{ github.ref_name }}
            
            PaperWise is an AI-powered paper reading assistant.
            
            ### Requirements
            - Windows 10/11
            - DeepSeek API Key (get at https://platform.deepseek.com)
            
            ### Changelog
            See CHANGELOG.md for details.
