<h2>PaperPal 整体设计方向</h2>
<p class="subtitle">选择你最偏好的风格，或告诉我你的想法</p>

<div class="cards">
  <div class="card" data-choice="whimsical" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>爱丽丝童话风</h3>
      <div style="display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;">
        <span style="background:#2D1B3E;color:#E8C87A;padding:4px 12px;border-radius:12px">深紫</span>
        <span style="background:#1A1A2E;color:#F0A050;padding:4px 12px;border-radius:12px">暖金</span>
        <span style="background:#2A1A1A;color:#D4A574;padding:4px 12px;border-radius:12px">暖棕</span>
      </div>
      <p>深色神秘基底 + 暖金点缀，扑克牌/兔子洞/怀表元素贯穿。与已定的图标风格一致，强品牌辨识度。</p>
    </div>
  </div>
  <div class="card" data-choice="modern" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>现代学术风</h3>
      <div style="display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;">
        <span style="background:#1565C0;color:#fff;padding:4px 12px;border-radius:12px">学术蓝</span>
        <span style="background:#F5F5F5;color:#333;padding:4px 12px;border-radius:12px">极简白</span>
        <span style="background:#E8F5E9;color:#2E7D32;padding:4px 12px;border-radius:12px">引用绿</span>
      </div>
      <p>干净、留白多、专注阅读。接近当前蓝色主题的升级版，适合长时间阅读论文。</p>
    </div>
  </div>
  <div class="card" data-choice="glassmorphic" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>玻璃拟态 + AI 科技风</h3>
      <div style="display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;">
        <span style="background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:4px 12px;border-radius:12px">渐变紫</span>
        <span style="background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:4px 12px;border-radius:12px">毛玻璃</span>
        <span style="background:#00D2FF;color:#000;padding:4px 12px;border-radius:12px">科技青</span>
      </div>
      <p>毛玻璃卡片、渐变背景、微光效。现代 AI 产品常用风格（如 ChatGPT、Cursor）。</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="subtitle">当前主题</p>
  <div style="background:#1565C0;color:#fff;padding:12px 16px;border-radius:8px;display:inline-block;margin-top:8px;">
    当前: Material 3 默认蓝色 #1565C0
  </div>
</div>
