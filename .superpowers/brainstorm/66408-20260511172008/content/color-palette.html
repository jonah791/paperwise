<h2>爱丽丝童话风 — 配色方案</h2>
<p class="subtitle">选择你偏好的色彩搭配</p>

<div class="cards">
  <div class="card" data-choice="deep" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>深邃神秘 <span class="label">推荐</span></h3>
      <div style="display:flex;gap:4px;margin:12px 0;">
        <div style="background:#1A1025;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#1A1025 深紫黑"></div>
        <div style="background:#2D1B3E;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#2D1B3E 暗紫"></div>
        <div style="background:#E8C87A;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#E8C87A 暖金"></div>
        <div style="background:#D4A574;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#D4A574 琥珀"></div>
        <div style="background:#5C3D6E;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#5C3D6E 中紫"></div>
        <div style="background:#F5E6D3;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#F5E6D3 暖白"></div>
      </div>
      <p>暗底色为主，暖金点缀。深色模式高端感，阅读区暖白护眼。适合暗色模式优先。</p>
    </div>
  </div>
  <div class="card" data-choice="elegant" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>优雅暖金 <span class="label">浅色友好</span></h3>
      <div style="display:flex;gap:4px;margin:12px 0;">
        <div style="background:#FFF8F0;width:48px;height:48px;border-radius:8px;border:2px solid #ddd" title="#FFF8F0 暖白底"></div>
        <div style="background:#F0D9B5;width:48px;height:48px;border-radius:8px;border:2px solid #ddd" title="#F0D9B5 浅金"></div>
        <div style="background:#8B5CF6;width:48px;height:48px;border-radius:8px;border:2px solid #ddd" title="#8B5CF6 紫"></div>
        <div style="background:#6D28D9;width:48px;height:48px;border-radius:8px;border:2px solid #ddd" title="#6D28D9 深紫"></div>
        <div style="background:#B8860B;width:48px;height:48px;border-radius:8px;border:2px solid #ddd" title="#B8860B 暗金"></div>
        <div style="background:#2D1B3E;width:48px;height:48px;border-radius:8px;border:2px solid #ddd" title="#2D1B3E 暗紫"></div>
      </div>
      <p>暖白基底 + 紫色品牌色，清亮优雅。浅色模式为主，阅读体验更柔和。</p>
    </div>
  </div>
  <div class="card" data-choice="mystic" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>幻彩琉璃 <span class="label">大胆</span></h3>
      <div style="display:flex;gap:4px;margin:12px 0;">
        <div style="background:linear-gradient(135deg,#1A1025,#2D1B3E);width:48px;height:48px;border-radius:8px;border:2px solid #333" title="深紫渐变"></div>
        <div style="background:linear-gradient(135deg,#E8C87A,#D4A574);width:48px;height:48px;border-radius:8px;border:2px solid #333" title="金渐变"></div>
        <div style="background:#7C3AED;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#7C3AED 亮紫"></div>
        <div style="background:#F59E0B;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#F59E0B 亮金"></div>
        <div style="background:#EC4899;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#EC4899 粉"></div>
        <div style="background:#06B6D4;width:48px;height:48px;border-radius:8px;border:2px solid #333" title="#06B6D4 青"></div>
      </div>
      <p>渐变丰富，紫金粉青多色搭配。视觉效果最强，但实现难度和翻车风险最高。</p>
    </div>
  </div>
</div>

<div class="section">
  <p class="subtitle">提示：图标用的是深紫(#2D1B3E) + 暖金(#E8C87A)，方案1与之最一致。</p>
</div>
