<h2>整体视觉方向</h2>
<p class="subtitle">PaperPal 目前的蓝色调偏学术，你想往哪个方向走？</p>

<div class="options">
  <div class="option" data-choice="alice" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>Alice 奇幻暖色风</h3>
      <p>深紫/暖金渐变底色，圆润卡片，微光效。配合新图标，突出 AI 生命感和童话氛围</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:#2D1B4E"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#E8C87A"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#C4944A"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#B8A9C9"></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="modern" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>现代极简科技风</h3>
      <p>灰色/白色主调，蓝紫点缀，大量留白，锐利直角，强调排版和可读性</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:#1A1A2E"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#16213E"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#0F3460"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#E8E8E8"></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="academic" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>学术专业风</h3>
      <p>类似 arXiv / Google Scholar，沉稳蓝色系，干净克制，功能性优先</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:#1B3A5C"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#2E6F9E"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#8AB4D6"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#F0F4F8"></div>
      </div>
    </div>
  </div>
  <div class="option" data-choice="dark" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>暗色优先 + 渐变霓虹</h3>
      <p>默认深色模式，霓虹紫/青蓝渐变，适合深夜读论文，视觉冲击力强</p>
      <div style="display:flex;gap:8px;margin-top:8px">
        <div style="width:24px;height:24px;border-radius:50%;background:#0D0D1A"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#1A1A3E"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#7C3AED"></div>
        <div style="width:24px;height:24px;border-radius:50%;background:#06B6D4"></div>
      </div>
    </div>
  </div>
</div>

<p style="margin-top:2rem;color:#888;font-size:0.9rem">点击选择你最倾向的方向，然后在终端告诉我。</p>
