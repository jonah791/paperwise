<h2>你想美化哪些方面？</h2>
<p class="subtitle">PaperPal 目前有 6 个页面，告诉我你最关注的部分</p>

<div class="options" data-multiselect>
  <div class="option" data-choice="theme" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>整体主题 &amp; 配色</h3>
      <p>颜色系统、字体、明暗模式、品牌感</p>
    </div>
  </div>
  <div class="option" data-choice="transitions" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>页面切换 &amp; 动画</h3>
      <p>页面过渡、列表进出场、加载骨架屏</p>
    </div>
  </div>
  <div class="option" data-choice="readpage" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>阅读页体验</h3>
      <p>论文展示、QA 聊天、笔记面板、对比视图</p>
    </div>
  </div>
  <div class="option" data-choice="library" onclick="toggleSelect(this)">
    <div class="letter">D</div>
    <div class="content">
      <h3>论文库 &amp; 搜索</h3>
      <p>卡片样式、筛选交互、搜索空状态</p>
    </div>
  </div>
  <div class="option" data-choice="onboarding" onclick="toggleSelect(this)">
    <div class="letter">E</div>
    <div class="content">
      <h3>欢迎页 &amp; 设置</h3>
      <p>首次启动体验、表单美化、灵魂选择器</p>
    </div>
  </div>
  <div class="option" data-choice="polish" onclick="toggleSelect(this)">
    <div class="letter">F</div>
    <div class="content">
      <h3>细节打磨</h3>
      <p>图标、分割线、间距、卡片阴影、悬停效果</p>
    </div>
  </div>
</div>

<p style="margin-top:2rem;color:#888;font-size:0.9rem">在上方点击选择（可多选），然后在终端告诉我你的想法。</p>
