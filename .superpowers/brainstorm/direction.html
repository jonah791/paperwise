<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>PaperPal 前端美化</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #0f0f1a; color: #e0d8f0; padding: 20px; }
.card { background: linear-gradient(135deg, #1a1a30, #151525); border: 1px solid #2a2040; border-radius: 16px; padding: 24px; margin-bottom: 16px; cursor: pointer; transition: all .2s; }
.card:hover { border-color: #c4944a; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(196,148,74,.15); }
.card.selected { border-color: #e8c87a; box-shadow: 0 0 0 2px #e8c87a33, 0 8px 24px rgba(196,148,74,.25); }
.letter { display: inline-flex; width: 32px; height: 32px; background: linear-gradient(135deg, #e8c87a, #c4944a); color: #1a1030; border-radius: 8px; align-items: center; justify-content: center; font-weight: 700; margin-right: 12px; flex-shrink: 0; }
h2 { font-size: 1.3rem; margin-bottom: 4px; }
p { color: #a898c0; font-size: .9rem; line-height: 1.5; }
h3 { display: flex; align-items: center; font-size: 1.05rem; }
.colors { display: flex; gap: 8px; margin-top: 10px; }
.swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid rgba(255,255,255,.1); }
.btn { display: inline-block; padding: 12px 32px; background: linear-gradient(135deg, #e8c87a, #c4944a); color: #1a1030; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 16px; }
.btn:active { transform: scale(.97); }
.selection { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(135deg, #1a1a30, #151525); border-top: 1px solid #2a2040; padding: 16px 20px; }
.selection.show { display: flex; align-items: center; gap: 12px; }
.result { background: #2a2040; border-radius: 8px; padding: 8px 16px; font-size: .85rem; flex: 1; }
</style>
</head>
<body>

<h2 style="margin-bottom:16px">整体视觉方向</h2>
<p style="margin-bottom:20px">PaperPal 目前的蓝色调偏学术，你想往哪个方向走？</p>

<div class="card" onclick="pick(this,'alice')">
  <h3><span class="letter">A</span> Alice 奇幻暖色风</h3>
  <p>深紫/暖金渐变底色，圆润卡片，微光效。配合新图标，突出 AI 生命感和童话氛围</p>
  <div class="colors">
    <div class="swatch" style="background:#2D1B4E"></div>
    <div class="swatch" style="background:#E8C87A"></div>
    <div class="swatch" style="background:#C4944A"></div>
    <div class="swatch" style="background:#B8A9C9"></div>
  </div>
</div>

<div class="card" onclick="pick(this,'modern')">
  <h3><span class="letter">B</span> 现代极简科技风</h3>
  <p>灰色/白色主调，蓝紫点缀，大量留白，锐利直角，强调排版和可读性</p>
  <div class="colors">
    <div class="swatch" style="background:#1A1A2E"></div>
    <div class="swatch" style="background:#16213E"></div>
    <div class="swatch" style="background:#0F3460"></div>
    <div class="swatch" style="background:#E8E8E8"></div>
  </div>
</div>

<div class="card" onclick="pick(this,'academic')">
  <h3><span class="letter">C</span> 学术专业风</h3>
  <p>类似 arXiv / Google Scholar，沉稳蓝色系，干净克制，功能性优先</p>
  <div class="colors">
    <div class="swatch" style="background:#1B3A5C"></div>
    <div class="swatch" style="background:#2E6F9E"></div>
    <div class="swatch" style="background:#8AB4D6"></div>
    <div class="swatch" style="background:#F0F4F8"></div>
  </div>
</div>

<div class="card" onclick="pick(this,'dark')">
  <h3><span class="letter">D</span> 暗色优先 + 渐变霓虹</h3>
  <p>默认深色模式，霓虹紫/青蓝渐变，适合深夜读论文，视觉冲击力强</p>
  <div class="colors">
    <div class="swatch" style="background:#0D0D1A"></div>
    <div class="swatch" style="background:#1A1A3E"></div>
    <div class="swatch" style="background:#7C3AED"></div>
    <div class="swatch" style="background:#06B6D4"></div>
  </div>
</div>

<div id="selection" class="selection">
  <span>已选：</span>
  <span id="result" class="result">无</span>
  <button class="btn" onclick="submit()">确认选择</button>
</div>

<script>
let selected = '';
function pick(el, id) {
  document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  selected = id;
  document.getElementById('selection').classList.add('show');
  const names = { alice: 'Alice 奇幻暖色风', modern: '现代极简科技风', academic: '学术专业风', dark: '暗色优先 + 霓虹' };
  document.getElementById('result').textContent = names[id];
}
function submit() {
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:80vh;flex-direction:column;gap:16px"><div style="font-size:3rem">&#10003;</div><h2>已选择</h2><p id="final" style="font-size:1.1rem;color:#e8c87a"></p><p class="subtitle">请在终端告诉我你的选择</p></div>';
  const names = { alice: 'Alice 奇幻暖色风', modern: '现代极简科技风', academic: '学术专业风', dark: '暗色优先 + 霓虹' };
  document.getElementById('final').textContent = names[selected];
}
</script>
</body>
</html>
